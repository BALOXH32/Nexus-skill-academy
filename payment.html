    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1f6bff;
            --secondary: #20d6c7;
            --dark: #0b1020;
            --card: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --text: #eaf0ff;
            --muted: #a9b3d6;
            --glow: 0 0 40px rgba(32, 214, 199, .35);
            --glow-blue: 0 0 30px rgba(31, 107, 255, .4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, system-ui, sans-serif;
            background: radial-gradient(1200px 600px at top left, #16205a 0%, transparent 60%),
                        radial-gradient(1000px 500px at bottom right, #0d5b5b 0%, transparent 55%),
                        var(--dark);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, .15), transparent),
                radial-gradient(2px 2px at 60% 70%, rgba(32, 214, 199, .15), transparent),
                radial-gradient(1px 1px at 50% 50%, rgba(31, 107, 255, .15), transparent),
                radial-gradient(1px 1px at 80% 10%, rgba(255, 255, 255, .1), transparent);
            background-size: 200px 200px, 300px 300px, 250px 250px, 180px 180px;
            animation: float 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            to {
                background-position: 200px 200px, -300px -300px, 250px -250px, -180px 180px
            }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            color: var(--text);
            margin-bottom: 40px;
            padding: 20px;
        }

        .header h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 4s ease infinite;
            font-weight: 800;
        }

        @keyframes gradient {
            0%, 100% {
                background-position: 0% 50%
            }
            50% {
                background-position: 100% 50%
            }
        }

        .header p {
            font-size: 1.1em;
            color: var(--muted);
            font-weight: 500;
        }

        .payment-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--glow);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .course-info {
            background: linear-gradient(135deg, rgba(31, 107, 255, 0.15), rgba(32, 214, 199, 0.15));
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            color: var(--text);
            padding: 40px 30px;
            text-align: center;
        }

        .course-info h2 {
            font-size: 2em;
            margin-bottom: 12px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .course-info .course-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #001;
            padding: 8px 24px;
            border-radius: 25px;
            margin-top: 10px;
            font-size: 0.9em;
            font-weight: 700;
            box-shadow: var(--glow);
        }

        .price-section {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-bottom: 1px solid var(--border);
        }

        .price-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .price-label {
            font-size: 1.1em;
            color: var(--muted);
            font-weight: 500;
        }

        .price-amount {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--secondary);
            text-shadow: 0 0 20px rgba(32, 214, 199, .3);
        }

        .total-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .total-label {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--text);
        }

        .total-amount {
            font-size: 2em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .payment-methods {
            padding: 35px 30px;
        }

        .section-title {
            font-size: 1.5em;
            color: var(--text);
            margin-bottom: 25px;
            text-align: center;
            font-weight: 700;
        }

        .payment-option {
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            position: relative;
        }

        .payment-option:hover {
            border-color: var(--secondary);
            background: rgba(32, 214, 199, 0.08);
            transform: translateX(5px);
            box-shadow: var(--glow);
        }

        .payment-option.selected {
            border-color: var(--secondary);
            background: linear-gradient(135deg, rgba(31, 107, 255, 0.12), rgba(32, 214, 199, 0.12));
            box-shadow: var(--glow);
        }

        .payment-option input[type="radio"] {
            width: 22px;
            height: 22px;
            margin-right: 18px;
            cursor: pointer;
            accent-color: var(--secondary);
        }

        .payment-icon {
            width: 55px;
            height: 55px;
            margin-right: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 14px;
            color: #001;
            font-size: 1.4em;
            font-weight: 800;
            box-shadow: var(--glow-blue);
        }

        .payment-details {
            flex: 1;
        }

        .payment-title {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .payment-description {
            font-size: 0.9em;
            color: var(--muted);
        }

        .continue-button {
            width: 100%;
            padding: 18px;
            margin-top: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #001;
            border: none;
            border-radius: 14px;
            font-size: 1.15em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.35s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: var(--glow);
            position: relative;
            overflow: hidden;
        }

        .continue-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .3), transparent);
            transition: .5s ease;
        }

        .continue-button:hover::before {
            left: 100%;
        }

        .continue-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 50px rgba(32, 214, 199, .5);
        }

        .continue-button:active {
            transform: translateY(-1px);
        }

        .continue-button:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            color: var(--muted);
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--secondary);
            text-decoration: none;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-link a:hover {
            color: var(--primary);
            text-shadow: 0 0 15px rgba(31, 107, 255, .5);
        }

        .secure-badge {
            text-align: center;
            padding: 18px 15px 0;
            color: var(--muted);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .secure-badge::before {
            content: "🔒";
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .course-info h2 {
                font-size: 1.5em;
            }

            .payment-option {
                flex-direction: column;
                text-align: center;
            }

            .payment-icon {
                margin: 0 0 15px 0;
            }

            .payment-option input[type="radio"] {
                position: absolute;
                top: 20px;
                right: 20px;
            }
        }
    
/* MOBILE RESPONSIVENESS */

  nav{position:fixed;top:70px;left:-100%;width:100%;background:rgba(11,16,32,.98);flex-direction:column;padding:2rem;gap:1rem;transition:.3s;border-bottom:1px solid var(--border);}
  nav.active{left:0;}

  input, select, textarea, button{font-size:16px !important;}

  .logo img{width:35px;}

  .section-title{font-size:1.5rem;}
}

</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Nexus Skill Academy</h1>
            <p>Complete Your Enrollment</p>
        </div>

        <div class="payment-card">
            <div class="course-info">
                <h2>Digital Marketing Course</h2>
                <div class="course-badge">Professional Certificate Program</div>
            </div>

            <div class="price-section">
                <div class="price-details">
                    <span class="price-label">Course Fee:</span>
                    <span class="price-amount">Rs. 25,000</span>
                </div>
                <div class="total-section">
                    <span class="total-label">Total Amount:</span>
                    <span class="total-amount">Rs. 25,000</span>
                </div>
            </div>

            <div class="payment-methods">
                <h3 class="section-title">Select Payment Method</h3>

                <label class="payment-option" for="jazzcash">
                    <input type="radio" id="jazzcash" name="payment-method" value="jazzcash">
                    <div class="payment-icon">JC</div>
                    <div class="payment-details">
                        <div class="payment-title">JazzCash</div>
                        <div class="payment-description">Pay securely using your JazzCash mobile account</div>
                    </div>
                </label>

                <label class="payment-option" for="easypaisa">
                    <input type="radio" id="easypaisa" name="payment-method" value="easypaisa">
                    <div class="payment-icon">EP</div>
                    <div class="payment-details">
                        <div class="payment-title">EasyPaisa</div>
                        <div class="payment-description">Pay securely using your EasyPaisa mobile account</div>
                    </div>
                </label>

                <label class="payment-option" for="bank">
                    <input type="radio" id="bank" name="payment-method" value="bank">
                    <div class="payment-icon">🏦</div>
                    <div class="payment-details">
                        <div class="payment-title">Bank Account</div>
                        <div class="payment-description">Direct bank transfer or online banking</div>
                    </div>
                </label>

                <button class="continue-button" id="continueBtn" disabled>Continue to Payment</button>
                
                <div class="secure-badge">
                    Secure payment processing - Your information is protected
                </div>
            </div>
        </div>

        <div class="back-link">
            <a href="javascript:history.back()">← Back to Course Details</a>
        </div>
    </div>

    <script>
        // Handle payment method selection
        const paymentOptions = document.querySelectorAll('.payment-option');
        const radioButtons = document.querySelectorAll('input[name="payment-method"]');
        const continueBtn = document.getElementById('continueBtn');

        radioButtons.forEach((radio, index) => {
            radio.addEventListener('change', function() {
                // Remove selected class from all options
                paymentOptions.forEach(option => option.classList.remove('selected'));
                
                // Add selected class to chosen option
                if (this.checked) {
                    paymentOptions[index].classList.add('selected');
                    continueBtn.disabled = false;
                }
            });
        });

        // Allow clicking on the entire option div to select
        paymentOptions.forEach((option, index) => {
            option.addEventListener('click', function() {
                radioButtons[index].checked = true;
                radioButtons[index].dispatchEvent(new Event('change'));
            });
        });

        // Handle continue button
        continueBtn.addEventListener('click', function() {
            const selectedMethod = document.querySelector('input[name="payment-method"]:checked');
            if (selectedMethod) {
                const method = selectedMethod.value;
                // Here you would typically redirect to the payment gateway
                alert(`Proceeding to ${method.toUpperCase()} payment gateway for Digital Marketing Course\n\nAmount: Rs. 25,000`);
                // Example: window.location.href = `process-payment.html?method=${method}&course=digital-marketing&amount=25000`;
            }
        });
    </script>
<script>
function toggleMenu(){
  const nav = document.getElementById('mainNav');

}

document.addEventListener('click', function(event){
  const nav = document.getElementById('mainNav');
  const toggle = document.querySelector('.menu-toggle');
  if(!nav.contains(event.target) && !toggle.contains(event.target)){
    nav.classList.remove('active');
  }
});
</script>
