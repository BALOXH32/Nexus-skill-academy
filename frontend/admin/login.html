<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | Nexus Skill Academy</title>

<link rel="stylesheet" href="../css/style.css">

<style>

body{
  font-family: Arial, sans-serif;
  background: #0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:#1e293b;
  padding:40px;
  border-radius:10px;
  width:350px;
  color:white;
  text-align:center;
}

.login-box h2{
  margin-bottom:20px;
}

.login-box input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

.login-box button{
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.login-box button:hover{
  background:#16a34a;
}

.logo{
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">Nexus Skill Academy</div>

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Admin Email">

<input type="password" id="password" placeholder="Password">

<button onclick="adminLogin()">Login</button>

</div>

<script src="../js/admin.js"></script>

</body>
</html>
