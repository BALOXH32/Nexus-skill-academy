<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Nexus Skill Academy</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --dark-bg: #0f0f23;
            --card-bg: rgba(255, 255, 255, 0.98);
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --text-light: #718096;
            --border-color: rgba(102, 126, 234, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.16);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a1f;
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0a0a1f 0%, #1a1a3e 50%, #0f0f23 100%);
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.15) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }

        .animated-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(118, 75, 162, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(102, 126, 234, 0.1) 0%, transparent 50%);
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Particles Effect */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(102, 126, 234, 0.4);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        /* Main Container */
        .main-content {
            position: relative;
            z-index: 2;
        }

        /* Header */
        header {
            background: rgba(10, 10, 31, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
        }

        .logo-text h2 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-text p {
            font-size: 11px;
            color: #718096;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .notifications-btn {
            position: relative;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #a0aec0;
        }

        .notifications-btn:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            transform: translateY(-2px);
        }

        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #0a0a1f;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px 8px 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-profile:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: var(--primary-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 14px;
        }

        .user-info h4 {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .user-info p {
            font-size: 12px;
            color: #718096;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-2px);
        }

        /* Dashboard Container */
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        /* Hero Section */
        .hero-section {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 48px;
            margin-bottom: 40px;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .greeting-section {
            margin-bottom: 32px;
        }

        .greeting-time {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .greeting-time i {
            color: #667eea;
        }

        .greeting-title {
            font-size: 42px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .greeting-title .highlight {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .greeting-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            border: 1px solid rgba(102, 126, 234, 0.15);
            border-radius: 20px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            background: var(--primary-gradient);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .stat-trend {
            font-size: 14px;
            color: #10b981;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .stat-label {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Section Header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .section-title h2 {
            font-size: 32px;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title .icon-wrapper {
            width: 44px;
            height: 44px;
            background: var(--primary-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
        }

        .view-all-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .view-all-btn:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        /* Courses Grid */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 32px;
            margin-bottom: 60px;
        }

        .course-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
        }

        .course-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 24px 56px rgba(102, 126, 234, 0.25);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .course-thumbnail {
            position: relative;
            height: 220px;
            background: var(--primary-gradient);
            overflow: hidden;
        }

        .course-thumbnail::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            z-index: 2;
        }

        .course-thumbnail-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,.05) 10px, rgba(255,255,255,.05) 20px);
        }

        .course-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            color: rgba(255, 255, 255, 0.2);
            z-index: 1;
        }

        .course-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 3;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .course-progress-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 3;
            padding: 0 20px 20px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }

        .progress-percentage {
            font-size: 14px;
            color: white;
            font-weight: 700;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22d3ee);
            border-radius: 10px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.6);
        }

        .course-content {
            padding: 32px;
        }

        .course-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            color: #667eea;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .course-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 24px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-meta {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .meta-item i {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 14px;
        }

        .course-footer {
            display: flex;
            gap: 12px;
        }

        .continue-btn {
            flex: 1;
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .continue-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .continue-btn:hover::before {
            left: 100%;
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.4);
        }

        .bookmark-btn {
            width: 56px;
            height: 56px;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #667eea;
            font-size: 18px;
        }

        .bookmark-btn:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 80px 40px;
            text-align: center;
            border: 2px dashed var(--border-color);
        }

        .empty-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 56px;
            color: #667eea;
        }

        .empty-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .empty-description {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .browse-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
        }

        .browse-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.4);
        }

        /* Loading State */
        .loading-container {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            color: white;
            font-weight: 600;
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .courses-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 24px;
            }
        }

        @media (max-width: 768px) {
            .header-container {
                padding: 16px 20px;
            }

            .logo-text h2 {
                font-size: 20px;
            }

            .user-info {
                display: none;
            }

            .dashboard-container {
                padding: 24px 20px;
            }

            .hero-section {
                padding: 32px 24px;
            }

            .greeting-title {
                font-size: 28px;
            }

            .greeting-subtitle {
                font-size: 15px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .section-title h2 {
                font-size: 24px;
            }

            .courses-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .course-footer {
                flex-direction: column;
            }

            .bookmark-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .hero-section {
                padding: 24px 20px;
            }

            .greeting-title {
                font-size: 24px;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg"></div>
    
    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <header>
            <div class="header-container">
                <div class="logo-section">
                    <div class="logo-icon">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <div class="logo-text">
                        <h2>NEXUS SKILL ACADEMY</h2>
                        <p>Learning Excellence</p>
                    </div>
                </div>

                <div class="header-right">
                    <button class="notifications-btn">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">3</span>
                    </button>

                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">JD</div>
                        <div class="user-info">
                            <h4 id="headerUserName">John Doe</h4>
                            <p>Premium Student</p>
                        </div>
                    </div>

                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Dashboard Container -->
        <div class="dashboard-container">
            <!-- Hero Section -->
            <div class="hero-section">
                <div class="hero-content">
                    <div class="greeting-section">
                        <div class="greeting-time">
                            <i class="fas fa-sun"></i>
                            <span id="greetingTime">Good Morning</span>
                        </div>
                        <h1 class="greeting-title">
                            Welcome back, <span class="highlight" id="studentName">John</span>! 🚀
                        </h1>
                        <p class="greeting-subtitle">Ready to continue your learning journey? Let's achieve something great today!</p>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon">
                                <i class="fas fa-book-open"></i>
                            </div>
                            <div class="stat-value">
                                <span id="totalCourses">0</span>
                                <span class="stat-trend"><i class="fas fa-arrow-up"></i> 12%</span>
                            </div>
                            <div class="stat-label">Total Courses</div>
                        </div>

                        <div class="stat-card">
                            <div class="stat-icon">
                                <i class="fas fa-certificate"></i>
                            </div>
                            <div class="stat-value">
                                <span id="completedCourses">0</span>
                                <span class="stat-trend"><i class="fas fa-arrow-up"></i> 8%</span>
                            </div>
                            <div class="stat-label">Completed</div>
                        </div>

                        <div class="stat-card">
                            <div class="stat-icon">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div class="stat-value">
                                <span id="learningHours">24</span>
                                <span class="stat-trend"><i class="fas fa-arrow-up"></i> 15%</span>
                            </div>
                            <div class="stat-label">Learning Hours</div>
                        </div>

                        <div class="stat-card">
                            <div class="stat-icon">
                                <i class="fas fa-fire"></i>
                            </div>
                            <div class="stat-value">
                                <span id="streakDays">7</span>
                                <span class="stat-trend"><i class="fas fa-arrow-up"></i> 5%</span>
                            </div>
                            <div class="stat-label">Day Streak</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- My Courses Section -->
            <div class="section-header">
                <div class="section-title">
                    <div class="icon-wrapper">
                        <i class="fas fa-play-circle"></i>
                    </div>
                    <h2>My Courses</h2>
                </div>
                <button class="view-all-btn">
                    <span>View All</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>

            <div id="myCourses" class="courses-grid">
                <!-- Loading State -->
                <div class="loading-container" id="loadingState">
                    <div class="loader"></div>
                    <p class="loading-text">Loading your courses...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/studentDashboard.js"></script>
    <script>
        /**
         * BACKEND INTEGRATION GUIDE
         * ========================
         * 
         * Expected API Endpoint: GET /api/student/courses
         * 
         * Expected Response Format:
         * {
         *     "courses": [
         *         {
         *             "id": 1,
         *             "title": "Course Title",
         *             "category": "Category Name",
         *             "description": "Course description",
         *             "lessons": 48,
         *             "duration": "12 hours",
         *             "progress": 65,
         *             "icon": "fa-code",  // Font Awesome icon class
         *             "badge": "Popular",  // Optional: Popular, Trending, New, Best Seller, Featured, Professional
         *             "gradient": "linear-gradient(135deg, #667eea 0%, #764ba2 100%)"  // Optional: custom gradient
         *         }
         *     ]
         * }
         * 
         * To integrate backend:
         * 1. Uncomment the fetch() call in loadCourses()
         * 2. Update the API endpoint URL
         * 3. Add error handling
         * 4. Handle loading states
         */

        // Create particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Set greeting based on time
        function setGreeting() {
            const hour = new Date().getHours();
            let greeting = 'Good Morning';
            
            if (hour >= 12 && hour < 17) {
                greeting = 'Good Afternoon';
            } else if (hour >= 17) {
                greeting = 'Good Evening';
            }
            
            document.getElementById('greetingTime').textContent = greeting;
        }

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            setGreeting();

            // Get student info
            const studentName = localStorage.getItem('studentName') || 'Student';
            const firstName = studentName.split(' ')[0];
            
            document.getElementById('studentName').textContent = firstName;
            document.getElementById('headerUserName').textContent = studentName;
            
            // Set avatar initials
            const initials = studentName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            document.getElementById('userAvatar').textContent = initials;

            // Load courses
            setTimeout(() => {
                loadCourses();
            }, 1500);
        });

        // Load courses from backend
        function loadCourses() {
            const coursesContainer = document.getElementById('myCourses');
            
            // TODO: Replace with actual backend API call
            // Example: fetch('/api/student/courses')
            //     .then(response => response.json())
            //     .then(data => {
            //         const courses = data.courses;
            //         displayCourses(courses);
            //     });
            
            // For now, simulate empty courses (will be replaced with backend data)
            const courses = [];
            
            // Update stats
            updateDashboardStats(courses);

            // Display courses
            displayCourses(courses);
        }

        function updateDashboardStats(courses) {
            document.getElementById('totalCourses').textContent = courses.length;
            document.getElementById('completedCourses').textContent = courses.filter(c => c.progress >= 100).length;
        }

        function displayCourses(courses) {
            const coursesContainer = document.getElementById('myCourses');

            if (courses.length === 0) {
                coursesContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-book-open"></i>
                        </div>
                        <h3 class="empty-title">No Courses Enrolled Yet</h3>
                        <p class="empty-description">
                            Start your learning journey today! Browse our extensive course catalog and enroll in courses that match your career goals.
                        </p>
                        <button class="browse-btn" onclick="window.location.href='../index.html'">
                            <i class="fas fa-compass"></i>
                            <span>Explore Courses</span>
                        </button>
                    </div>
                `;
                return;
            }

            courses.forEach(course => {
                const card = createCourseCard(course);
                coursesContainer.appendChild(card);
            });

            // Animate cards
            setTimeout(() => {
                document.querySelectorAll('.course-card').forEach((card, index) => {
                    setTimeout(() => {
                        card.style.opacity = '0';
                        card.style.transform = 'translateY(20px)';
                        setTimeout(() => {
                            card.style.transition = 'all 0.5s ease';
                            card.style.opacity = '1';
                            card.style.transform = 'translateY(0)';
                        }, 50);
                    }, index * 100);
                });
            }, 100);
        }

        function createCourseCard(course) {
            const card = document.createElement('div');
            card.className = 'course-card';
            
            // Default gradients if not provided by backend
            const defaultGradients = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
                'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
                'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)'
            ];
            
            const gradient = course.gradient || defaultGradients[course.id % defaultGradients.length];
            const icon = course.icon || 'fa-book';
            const badge = course.badge || 'Course';
            
            const statusText = course.progress === 0 ? 'Start Learning' : 
                             course.progress >= 100 ? 'Review Course' : 'Continue Learning';
            
            card.innerHTML = `
                <div class="course-thumbnail" style="background: ${gradient}">
                    <div class="course-thumbnail-pattern"></div>
                    <i class="fab ${icon} course-icon"></i>
                    <span class="course-badge">${badge}</span>
                    <div class="course-progress-wrapper">
                        <div class="progress-info">
                            <span class="progress-label">Progress</span>
                            <span class="progress-percentage">${course.progress}%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${course.progress}%"></div>
                        </div>
                    </div>
                </div>
                <div class="course-content">
                    <span class="course-category">
                        <i class="fas fa-tag"></i>
                        ${course.category}
                    </span>
                    <h3 class="course-title">${course.title}</h3>
                    <p class="course-description">${course.description}</p>
                    <div class="course-meta">
                        <div class="meta-item">
                            <i class="fas fa-play-circle"></i>
                            <span>${course.lessons} Lessons</span>
                        </div>
                        <div class="meta-item">
                            <i class="fas fa-clock"></i>
                            <span>${course.duration}</span>
                        </div>
                    </div>
                    <div class="course-footer">
                        <button class="continue-btn" onclick="watchCourse(${course.id})">
                            <i class="fas fa-play"></i>
                            <span>${statusText}</span>
                        </button>
                        <button class="bookmark-btn" onclick="toggleBookmark(${course.id})">
                            <i class="fas fa-bookmark"></i>
                        </button>
                    </div>
                </div>
            `;
            
            return card;
        }

        function watchCourse(courseId) {
            // Redirect to course player
            window.location.href = `course-player.html?id=${courseId}`;
        }

        function toggleBookmark(courseId) {
            console.log('Bookmark toggled for course:', courseId);
            // Add bookmark functionality
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = '../index.html';
            }
        }
    </script>
</body>
</html>
